<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="game-shell" aria-label="Snake game">
        <header class="game-header">
          <div>
            <p class="eyebrow">Classic Mode</p>
            <h1>Snake</h1>
          </div>
          <div class="stats" aria-live="polite">
            <p>Score: <span id="score">0</span></p>
            <p>Status: <span id="status">Waiting to Start</span></p>
          </div>
        </header>

        <div
          id="board"
          class="board"
          role="grid"
          aria-label="Snake board"
        ></div>

        <div class="actions">
          <button id="start-button" type="button">Start Game</button>
          <button id="pause-button" type="button">Pause</button>
          <button id="restart-button" type="button">Restart</button>
        </div>

        <div class="controls" aria-label="Touch controls">
          <button data-direction="up" type="button" aria-label="Move up">↑</button>
          <div class="controls-row">
            <button data-direction="left" type="button" aria-label="Move left">←</button>
            <button data-direction="down" type="button" aria-label="Move down">↓</button>
            <button data-direction="right" type="button" aria-label="Move right">→</button>
          </div>
        </div>

        <p class="help">
          Use arrow keys or WASD to move. Press space to pause or resume.
        </p>
      </section>
    </main>

    <script type="module" src="./src/game.js"></script>
  </body>
</html>
